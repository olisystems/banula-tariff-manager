server:
  port: 8080

spring:
  main:
    headless: true
  profiles:
    active: ${ENVIRONMENT:local}
  data:
    mongodb:
      username: ${MONGO_USER:}
      password: ${MONGO_PASSWORD:}
      database: ${MONGO_ENV:}
      host: ${MONGO_ADDRESS:}
      auto-index-creation: true

api:
  url: ${TARIFF_MANAGER_URL:}
  role: OTHER
  log-payload: ${TARIFF_MANAGER_LOG_PAYLOAD:false}
  collection-prefix: "TariffManager_"
  log-curl-command: ${TARIFF_MANAGER_LOG_CURL_COMMAND:false}

# When require-energy-mix is true, PUT /tariffs only persists tariffs whose energy_mix has
# is_green_energy true and energy_product_name equal to energy-product-name.
feature-flags:
  require-energy-mix: ${TARIFF_MANAGER_REQUIRE_ENERGY_MIX:false}
  energy-product-name: ${TARIFF_MANAGER_ENERGY_PRODUCT_NAME:BANULA_CPO_TARIFF}

platform:
  url: ${PLATFORM_URL:}
  party-id: ${PLATFORM_PARTY_ID:}
  country-code: ${PLATFORM_COUNTRY_CODE:}

hashing-service:
  url: ${HASHING_SERVICE_URL:}

springdoc:
  swagger-ui:
    path: /swagger-ui
    enabled: ${SWAGGER_ENABLED:true}
    config-url: ${SERVER_CONTEXT_PATH:}/api-docs/swagger-config
    url: ${SERVER_CONTEXT_PATH:}/api-docs
  api-docs:
    path: /api-docs
    enabled: ${SWAGGER_ENABLED:true}
