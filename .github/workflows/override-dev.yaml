name: Override Dev

on:
  workflow_dispatch:

jobs:
  override-dev:
    name: Override Dev
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute short SHA
        id: sha
        run: echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Login to SWR
        uses: docker/login-action@v3
        with:
          registry: swr.eu-de.otc.t-systems.com
          username: ${{ secrets.OTC_USERNAME }}
          password: ${{ secrets.OTC_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_SUMMARY: "false"
        with:
          platforms: linux/amd64
          push: true
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            swr.eu-de.otc.t-systems.com/oli_banula/tariff-manager:latest
            swr.eu-de.otc.t-systems.com/oli_banula/tariff-manager:${{ github.ref_name }}
            swr.eu-de.otc.t-systems.com/oli_banula/tariff-manager:develop-${{ steps.sha.outputs.short_sha }}
            swr.eu-de.otc.t-systems.com/oli_banula/tariff-manager:${{ steps.sha.outputs.short_sha }}

      - name: Connect to VPN
        env:
          VPN_CONFIG: ${{ secrets.VPN_CONFIG }}
          VPN_PASS: ${{ secrets.VPN_PASS }}
        run: |
          sudo apt-get update && sudo apt-get install -y openvpn
          printf '%s' "$VPN_CONFIG" > vpn.conf
          printf '%s' "$VPN_PASS" > .vpn_pass
          sudo openvpn --config vpn.conf --askpass .vpn_pass --log ovpn.log --daemon
          for attempt in $(seq 1 30); do
            if sudo grep -q "Initialization Sequence Completed" ovpn.log 2>/dev/null; then
              echo "VPN connection established"
              break
            fi
            sleep 2
          done
          if ! sudo grep -q "Initialization Sequence Completed" ovpn.log 2>/dev/null; then
            echo "VPN failed to establish within timeout"
            sudo tail -n 100 ovpn.log || true
            exit 1
          fi
          rm -f vpn.conf .vpn_pass

      - name: Configure kubectl and point ArgoCD dev app to feature branch
        env:
          KUBECONFIG_CONTENT: ${{ secrets.KUBECONFIG }}
          BRANCH: ${{ github.ref_name }}
          SHORT_SHA: ${{ steps.sha.outputs.short_sha }}
        run: |
          printf '%s' "$KUBECONFIG_CONTENT" > "$RUNNER_TEMP/kubeconfig.yaml"
          chmod 600 "$RUNNER_TEMP/kubeconfig.yaml"
          export KUBECONFIG="$RUNNER_TEMP/kubeconfig.yaml"
          patch=$(jq -nc \
            --arg rev "$BRANCH" \
            --arg tag "develop-$SHORT_SHA" \
            '{spec:{source:{targetRevision:$rev,helm:{parameters:[{name:"oli-app.image.tag",value:$tag}]}}}}')
          kubectl patch application tariff-manager-dev -n argocd --type merge -p "$patch"
