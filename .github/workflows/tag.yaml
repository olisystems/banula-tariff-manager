name: Update Prod Tag

on:
  release:
    types: [published]

jobs:
  build-and-push:
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to SWR
        uses: docker/login-action@v3
        with:
          registry: swr.eu-de.otc.t-systems.com
          username: ${{ secrets.OTC_USERNAME }}
          password: ${{ secrets.OTC_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_SUMMARY: "false"
        with:
          platforms: linux/amd64
          push: true
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: swr.eu-de.otc.t-systems.com/oli_banula/tariff-manager:${{ github.ref_name }}

  update-prod:
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update Argo app
        env:
          TAG: ${{ github.ref_name }}
        run: |
          yq -i '.spec.source.targetRevision = env(TAG)' infra/argo/prod.yaml
          yq -i '(.spec.source.helm.parameters[] | select(.name == "oli-app.image.tag")).value = env(TAG)' infra/argo/prod.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/argo/prod.yaml
          git commit -m "chore: update prod to ${{ github.ref_name }}"
          git push
