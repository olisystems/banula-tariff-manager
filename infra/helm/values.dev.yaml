oli-app:
  fullnameOverride: "tariff-manager-dev"
  image:
    tag: ""
  ingress:
    hosts:
      - host: banula-dev.oli-system.com
    tls:
      - secretName: banula-dev-tls
        hosts:
          - banula-dev.oli-system.com
    features:
      router:
        routes:
          exposeAll: true
  env:
    ENVIRONMENT: "dev"
    SPRING_PROFILE: "dev"
    TARIFF_MANAGER_URL: "https://banula-dev.oli-system.com/tariff-manager"
