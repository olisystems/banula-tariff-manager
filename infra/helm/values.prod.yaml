oli-app:
  fullnameOverride: "tariff-manager-prod"
  image:
    tag: "v0.1.0"
  ingress:
    hosts:
      - host: banula.oli-system.com
    tls:
      - secretName: banula-tls
        hosts:
          - banula.oli-system.com
    features:
      router:
        routes:
          exposeCommon: true
  env:
    ENVIRONMENT: "prod"
    SPRING_PROFILE: "prod"
    TARIFF_MANAGER_URL: "https://banula.oli-system.com/tariff-manager"
